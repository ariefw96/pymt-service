services:
  # --- INFRASTRUCTURE: MESSAGE BROKER ---
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      # Mengecek apakah broker Kafka siap merespon request
      test: ["CMD-SHELL", "kafka-cluster cluster-id --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # --- Service Discovery ---
  eureka:
    build:
      context: ./eureka
    container_name: eureka
    ports:
      - "8761:8761"
    env_file:
      - .env
    # Eureka biasanya tidak butuh depends_on ke service lain

  # --- API Gateway ---
  gateway:
    build:
      context: ./gateway
    container_name: gateway-service
    ports:
      - "8080:8080"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      eureka:
        condition: service_started

  # --- Order Service ---
  order:
    build:
      context: ./order
    container_name: order-service
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      eureka:
        condition: service_started
      kafka:
        condition: service_healthy

  # --- Payment Service ---
  payment:
    build:
      context: ./payment
    container_name: payment-service
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      eureka:
        condition: service_started
      kafka:
        condition: service_healthy

  # --- Notification Service ---
  notification:
    build:
      context: ./notification
    container_name: notification-service
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      eureka:
        condition: service_started
      kafka:
        condition: service_healthy

networks:
  default:
    name: microservices-network